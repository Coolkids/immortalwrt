name: OpenWrt-auto-merge-ifb-CI

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 15 * *'

jobs:
  merge_main:
    name: merge dev-ifb into master-ifb
    runs-on: ubuntu-22.04

    steps:        
      - name: Set Env
        run: |
          git config --global user.email "github-actions@github.com"
          git config --global user.name "github-actions"
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{secrets.PUSH_TOKEN}}
        
      - name: Merge dev-ifb into master-ifb
        run: |
          git checkout master-ifb
          git pull origin dev-ifb
          git push origin master-ifb

      - name: Tag release
        id: create_tag
        run: |
          CURRENT_DATE=$(date +'%y.%m')
          git tag -a v$CURRENT_DATE-ifb -m "Release $CURRENT_DATE-ifb"
          git push origin v$CURRENT_DATE-ifb

      - name: Push Msg
        run: |
          CURRENT_DATE=$(date +'%y.%m')
          sh .github/push.sh ${{ secrets.CORPID }} ${{ secrets.CORPSECRET }} ${{ secrets.AGENTID }} "x86_64" "Merge dev-ifb into master-ifb v$CURRENT_DATE"
