
name: OpenWrt Build CI

on:
  workflow_call:
    inputs:
      ref:
        required: true
        type: string
      tag:
        required: false
        type: string


jobs:
  build:
    name: Build x86_64 OpenWrt Firmware
    runs-on: ubuntu-24.04
    outputs:
      is_release: ${{ steps.ctx.outputs.is_release }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: openwrt-musl-lite
            config: base_musl_config
            target: musl
            cache_key: base_musl_config
          - name: openwrt-glibc-lite
            config: base_glibc_config
            target: glibc
            cache_key: base_glibc_config
          - name: openwrt-musl-full
            config: full_musl_config
            target: musl
            cache_key: full_musl_config
          - name: openwrt-glibc-full
            config: full_glibc_config
            target: glibc
            cache_key: full_glibc_config
            
    steps:
      - name: Set workspace
        run: |
          sudo -E timedatectl set-timezone Asia/Shanghai

      - name: Resolve build context
        id: ctx
        run: |
          EVENT="${{ github.event_name }}"

          if [[ "$EVENT" == "workflow_call" || "$EVENT" == "workflow_dispatch" ]]; then
            REF="${{ inputs.ref }}"
            TAG="${{ inputs.tag }}"
          elif [[ "$EVENT" == "push" && "${GITHUB_REF}" == refs/tags/* ]]; then
            REF="${GITHUB_SHA}"
            TAG="${GITHUB_REF#refs/tags/}"
          else
            REF="${GITHUB_SHA}"
            TAG=""
          fi

          echo "ref=$REF" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT

          if [[ "$TAG" == v* ]]; then
            echo "is_release=true" >> $GITHUB_OUTPUT
          else
            echo "is_release=false" >> $GITHUB_OUTPUT
          fi

      - name: Show build type
        run: |
          echo "REF: ${{ steps.ctx.outputs.ref }}"
          echo "TAG: ${{ steps.ctx.outputs.tag }}"
          echo "Release: ${{ steps.ctx.outputs.is_release }}"

      - name: Maximize Build Space
        uses: easimon/maximize-build-space@master
        with:
          swap-size-mb: 1024
          temp-reserve-mb: 100
          root-reserve-mb: 1024

      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.ctx.outputs.ref }}

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Configure compilation environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt update -y
          sudo apt install -y ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential \
            bzip2 ccache clang cmake cpio curl device-tree-compiler ecj fastjar flex gawk gettext gcc-multilib \
            g++-multilib git gnutls-dev gperf haveged help2man intltool lib32gcc-s1 libc6-dev-i386 libelf-dev \
            libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses-dev libpython3-dev \
            libreadline-dev libssl-dev libtool libyaml-dev libz-dev lld llvm lrzsz mkisofs msmtp nano \
            ninja-build p7zip p7zip-full patch pkgconf python3 python3-pip python3-ply python3-docutils \
            python3-pyelftools qemu-utils re2c rsync scons squashfs-tools subversion swig texinfo uglifyjs \
            upx-ucl unzip vim wget xmlto xxd zlib1g-dev zstd yasm    

      - name: Show System Info
        run: |
          echo "==================== System Info ===================="
          uname -a
          echo ""
          echo "==================== CPU Info ===================="
          echo "Physical CPUs: $(cat /proc/cpuinfo | grep 'physical id' | sort -u | wc -l)"
          echo "CPU Cores: $(nproc)"
          echo "CPU Model: $(cat /proc/cpuinfo | grep -m1 'model name' | cut -d: -f2 | xargs)"
          echo ""
          echo "==================== Memory Info ===================="
          free -h
          echo ""
          echo "==================== Disk Info ===================="
          df -hT

      - name: Update feeds
        run: |
          ./tool.sh feed

      - name: Generate configuration file
        run: |
          rm -f ./.config*
          mkdir .ccache
          cp ./configs/${{ matrix.config }} ./.config
          echo 'CONFIG_DEVEL=y' >> .config
          echo 'CONFIG_CCACHE=y' >> .config
          # 设置 ccache 缓存目录并启用
          echo "CONFIG_CCACHE_DIR=/home/runner/work/immortalwrt/immortalwrt/.ccache" >> .config
          ccache -M 2G
          ccache -s
          make defconfig
          make download -j8
          df -h
          if [[ "${{ matrix.target }}" == "glibc" ]]; then
            echo "glibc环境, 禁用download-ci-llvm"
            sed -i 's/--set=llvm\.download-ci-llvm=true/--set=llvm.download-ci-llvm=false/' ./feeds/packages/lang/rust/Makefile
          fi
      
      # 恢复 ccache
      - name: Restore ccache
        uses: actions/cache/restore@v5
        with:
          path: /home/runner/work/immortalwrt/immortalwrt/.ccache
          key: ccache-${{ runner.os }}-${{ matrix.config }}-${{ github.run_id }}
          restore-keys: |
            ccache-${{ runner.os }}-${{ matrix.config }}-
            ccache-${{ matrix.config }}-
            ccache-${{ matrix.config }}

      - name: Compile firmware
        run: |
          make -j$(nproc) || make -j1 V=s

      - name: Save ccache
        uses: actions/cache/save@v5
        with:
          path: /home/runner/work/immortalwrt/immortalwrt/.ccache
          key: ccache-${{ runner.os }}-${{ matrix.config }}-${{ github.run_id }}
      
      - name: Show ccache stats
        run: |
          ccache -s

      - name: Prepare artifact
        run: |
          mkdir -p ./artifact/firmware
          mkdir -p ./artifact/buildinfo
          rm -rf $(find ./bin/targets/ -type d -name "packages")
          cp -rf $(find ./bin/targets/ -type f -name "immortalwrt-*") ./artifact/firmware/
          cp -rf $(find ./bin/targets/ -type f -name "sha256sums") ./artifact/firmware/
          cp -rf $(find ./bin/targets/ -type f -name "*.buildinfo" -o -name "*.manifest") ./artifact/buildinfo/

      - name: Deliver buildinfo
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.name }}-buildinfo
          path: artifact/buildinfo/

      - name: Deliver firmware
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.name }}
          path: artifact/firmware/